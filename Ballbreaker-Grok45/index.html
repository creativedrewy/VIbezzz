<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ball Breaker</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050510;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #e8f0ff;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #game-container {
        width: 100%;
        height: 100%;
        position: relative;
      }
      canvas { display: block; width: 100%; height: 100%; }
      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.35s ease;
        z-index: 10;
        padding-top: max(20px, 8vh, var(--ogp-safe-top-inset, 0px));
        padding-bottom: var(--ogp-safe-bottom-inset, 0px);
        background: radial-gradient(ellipse at center, rgba(10,12,40,0.55) 0%, rgba(5,5,16,0.88) 70%);
      }
      .overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }
      .overlay h1 {
        font-size: clamp(2.2rem, 8vw, 4.5rem);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        background: linear-gradient(180deg, #fff 0%, #7cf0ff 45%, #4a7dff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 40px rgba(80, 180, 255, 0.35);
        margin-bottom: 0.4em;
      }
      .overlay .subtitle {
        font-size: clamp(0.9rem, 2.5vw, 1.15rem);
        color: #9ab4e8;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        margin-bottom: 2rem;
      }
      .overlay p {
        color: #a8b8d8;
        max-width: 28rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
        font-size: clamp(0.85rem, 2vw, 1rem);
      }
      .btn {
        pointer-events: auto;
        cursor: pointer;
        border: 1px solid rgba(120, 200, 255, 0.55);
        background: linear-gradient(180deg, rgba(40, 80, 160, 0.55), rgba(20, 40, 90, 0.75));
        color: #e8f7ff;
        font-size: 1rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 0.9rem 2.2rem;
        border-radius: 4px;
        box-shadow: 0 0 24px rgba(60, 140, 255, 0.35), inset 0 0 12px rgba(120, 200, 255, 0.15);
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }
      .btn:hover, .btn:focus {
        transform: translateY(-2px);
        box-shadow: 0 0 36px rgba(80, 180, 255, 0.55), inset 0 0 16px rgba(140, 220, 255, 0.25);
        outline: none;
      }
      .btn:active { transform: translateY(0); }
      #hud {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: max(12px, var(--ogp-safe-top-inset, 0px)) 24px 0;
        font-size: clamp(0.85rem, 2vw, 1.1rem);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #c8dcff;
        text-shadow: 0 0 12px rgba(80, 160, 255, 0.6);
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #hud.visible { opacity: 1; }
      #hud .value {
        color: #7cf0ff;
        font-variant-numeric: tabular-nums;
        margin-left: 0.4em;
      }
      .score-big {
        font-size: clamp(2rem, 6vw, 3.5rem);
        color: #7cf0ff;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 28px rgba(80, 200, 255, 0.55);
        margin-bottom: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div>Score<span class="value" id="hud-score">0</span></div>
        <div>Lives<span class="value" id="hud-lives">3</span></div>
        <div>Level<span class="value" id="hud-level">1</span></div>
      </div>
      <div id="screen-start" class="overlay visible">
        <h1>Ball Breaker</h1>
        <p>Destroy every brick. Move with mouse, touch, or ← → / A D. Launch with click, tap, or Space.</p>
        <button class="btn" id="btn-start" type="button">Start Game</button>
      </div>

      <div id="screen-over" class="overlay">
        <h1 id="over-title">Game Over</h1>
        <div class="subtitle" id="over-sub">Final Score</div>
        <div class="score-big" id="over-score">0</div>
        <button class="btn" id="btn-restart" type="button">Play Again</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
