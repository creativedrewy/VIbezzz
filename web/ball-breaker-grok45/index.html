<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Ball Breaker</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;

        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #game-container {
        width: 100%;
        height: 100%;
        position: relative;
      }
      canvas {
        display: block;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }
      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;

      }
      .overlay.visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
      .overlay h1 {
        font-size: clamp(2.2rem, 8vw, 4.5rem);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        background: linear-gradient(180deg, #fff 0%, #7cf0ff 45%, #4a7dff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 40px rgba(80, 180, 255, 0.35);
        margin-bottom: 0.4em;
      }
      .overlay .subtitle {
        font-size: clamp(0.9rem, 2.5vw, 1.15rem);
        color: #9ab4e8;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        margin-bottom: 2rem;
      }
      .overlay p {
        color: #a8b8d8;
        max-width: 28rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
        font-size: clamp(0.85rem, 2vw, 1rem);
      }
      .btn {
        pointer-events: auto;
        cursor: pointer;
        border: 1px solid rgba(120, 200, 255, 0.55);
        background: linear-gradient(180deg, rgba(40, 80, 160, 0.55), rgba(20, 40, 90, 0.75));
        color: #e8f7ff;
        font-size: 1rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 0.9rem 2.2rem;
        border-radius: 4px;
        box-shadow: 0 0 24px rgba(60, 140, 255, 0.35), inset 0 0 12px rgba(120, 200, 255, 0.15);
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }
      .btn:hover, .btn:focus {
        transform: translateY(-2px);
        box-shadow: 0 0 36px rgba(80, 180, 255, 0.55), inset 0 0 16px rgba(140, 220, 255, 0.25);
        outline: none;
      }
      .btn:active { transform: translateY(0); }
      #hud {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: max(12px, var(--ogp-safe-top-inset, 0px)) 24px 0;
        font-size: clamp(0.85rem, 2vw, 1.1rem);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #c8dcff;
        text-shadow: 0 0 12px rgba(80, 160, 255, 0.6);
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #hud.visible { opacity: 1; }
      #hud .value {
        color: #7cf0ff;
        font-variant-numeric: tabular-nums;
        margin-left: 0.4em;
      }
      .score-big {
        font-size: clamp(2rem, 6vw, 3.5rem);
        color: #7cf0ff;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 28px rgba(80, 200, 255, 0.55);
        margin-bottom: 1.5rem;
      }
      .level-pick {
        margin: 0.5rem 0 1.4rem;
        width: min(20rem, 88vw);
        flex-shrink: 0;
        position: relative;
        z-index: 2;
        pointer-events: auto;
      }
      .level-pick-label {
        font-size: 0.75rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #8aa8d8;
        margin-bottom: 0.55rem;
      }
      #level-name {
        font-size: clamp(0.85rem, 2vw, 1rem);
        color: #7cf0ff;
        letter-spacing: 0.12em;
        margin-bottom: 0.75rem;
        height: 1.35em;
        line-height: 1.35em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #level-grid {
        display: grid;
        grid-template-columns: repeat(5, 3rem);
        grid-template-rows: repeat(2, 3rem);
        gap: 0.5rem;
        justify-content: center;
        pointer-events: auto;
        position: relative;
        z-index: 3;
      }
      .level-btn {
        width: 3rem;
        height: 3rem;
        min-width: 3rem;
        min-height: 3rem;
        max-width: 3rem;
        max-height: 3rem;
        box-sizing: border-box;
        cursor: pointer;
        border: 1px solid rgba(100, 170, 255, 0.35);
        background: rgba(20, 36, 80, 0.55);
        color: #c8dcff;
        font-size: 0.95rem;
        font-variant-numeric: tabular-nums;
        font-family: inherit;
        padding: 0;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease, color 0.12s ease;
        pointer-events: auto;
        -webkit-tap-highlight-color: transparent;
      }
      .level-btn:hover {
        border-color: rgba(140, 210, 255, 0.7);
        box-shadow: 0 0 14px rgba(60, 140, 255, 0.35);
      }
      .level-btn.selected {
        background: linear-gradient(180deg, rgba(50, 120, 220, 0.75), rgba(30, 70, 150, 0.85));
        border-color: rgba(140, 230, 255, 0.9);
        color: #fff;
        box-shadow: 0 0 18px rgba(80, 180, 255, 0.5);
      }
      #btn-start {
        position: relative;
        z-index: 2;
      }
      .over-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
        pointer-events: auto;
      }

        <div class="subtitle" id="over-sub">Final Score</div>

        <div class="over-actions">
          <button class="btn" id="btn-restart" type="button">Play Again</button>

      </div>
    </div>
