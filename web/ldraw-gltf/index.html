<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LDraw &rarr; GLB Converter</title>
    <script type="module" crossorigin src="/assets/index-DWlfHPRn.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-6yRubxdM.css">
  </head>
  <body>
    <div id="app">
      <!-- Drop zone overlay -->
      <div id="drop-zone">
        <div id="drop-zone-inner">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p>Drop an LDraw file here</p>
          <span class="hint">.ldr &middot; .dat &middot; .mpd</span>
        </div>
      </div>

      <!-- Toolbar -->
      <div id="toolbar">
        <button id="btn-open" title="Open LDraw file">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Open
        </button>
        <button id="btn-export" title="Export as GLB" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export GLB
        </button>
        <span id="status"></span>
      </div>

      <!-- Three.js canvas will be appended here -->
      <canvas id="viewport"></canvas>
    </div>

    <input type="file" id="file-input" accept=".ldr,.dat,.mpd" hidden />
  </body>
</html>
